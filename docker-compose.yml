services:
  # PostgreSQL database for users and authentication
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: banca
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - banca-net

  # TigerBeetle - financial transactions database
  # privileged: true is required on macOS Docker Desktop to enable io_uring
  tigerbeetle:
    build:
      context: .
      dockerfile: Dockerfile.tigerbeetle
    privileged: true
    volumes:
      - tigerbeetle_data:/data
    ports:
      - "3001:3000"
    networks:
      - banca-net
    restart: unless-stopped

  # Go backend API
  # privileged: true is required on macOS Docker Desktop for io_uring (TigerBeetle client uses it)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    privileged: true
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/banca?sslmode=disable
      TIGERBEETLE_ADDR: tigerbeetle:3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-3-nano-30b-a3b:free}
    volumes:
      # Seed data — the original JSON from the test is mounted directly (no setup step needed)
      - "./datos-prueba-HNL (1).json:/data/seed.json:ro"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - banca-net
    restart: unless-stopped

  # React frontend served by nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - banca-net
    restart: unless-stopped

volumes:
  postgres_data:
  tigerbeetle_data:

networks:
  banca-net:
    driver: bridge
